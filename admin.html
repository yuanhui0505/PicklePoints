<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理後台 - PicklePoints</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Auth Gate -->
  <div id="auth-gate" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:16px">
      <div style="text-align:center">
        <div class="app-title" style="font-size:1.8rem;margin-bottom:8px">PicklePoints</div>
        <div style="color:var(--text3);font-size:0.9rem">管理後台</div>
      </div>

      <!-- Role Toggle -->
      <div style="display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden">
        <button id="role-admin" onclick="setRole('admin')"
          style="flex:1;padding:10px;border-radius:0;background:var(--primary);color:#fff;font-size:0.9rem">
          系統管理者
        </button>
        <button id="role-manager" onclick="setRole('manager')"
          style="flex:1;padding:10px;border-radius:0;background:var(--surface2);color:var(--text2);font-size:0.9rem">
          賽程管理者
        </button>
      </div>

      <!-- Manager username (hidden for admin) -->
      <div class="input-group" id="field-username" style="display:none">
        <div class="input-label">帳號</div>
        <input type="text" id="input-username" placeholder="輸入帳號" autocomplete="off"
               onkeydown="if(event.key==='Enter')document.getElementById('input-pw').focus()">
      </div>

      <div class="input-group">
        <div class="input-label" id="pw-label">管理員密碼</div>
        <input type="password" id="input-pw" placeholder="輸入密碼" autocomplete="new-password"
               onkeydown="if(event.key==='Enter')login()">
      </div>

      <button class="btn-primary" style="width:100%" onclick="login()">登入</button>
      <div id="auth-error" style="color:var(--danger);text-align:center;font-size:0.9rem;display:none"></div>
    </div>
  </div>

  <!-- Main Panel -->
  <div id="main-panel" style="display:none">
    <header class="app-header">
      <button class="btn-back" onclick="location.href='index.html'">← 首頁</button>
      <span id="panel-role-label" style="color:var(--text2);font-size:0.9rem"></span>
      <button class="btn-ghost" style="font-size:0.8rem;padding:6px 12px" onclick="logout()">登出</button>
    </header>

    <div class="page-content">

      <!-- Tournaments -->
      <div class="admin-section">
        <div class="section-title">賽事管理</div>
        <div id="admin-tournaments"><div class="empty-state" style="padding:20px">載入中...</div></div>
        <button class="btn-primary" style="width:100%;margin-top:12px"
                onclick="openModal('modal-add-tournament')">+ 新增賽事</button>
      </div>

      <!-- Players -->
      <div class="admin-section">
        <div class="section-title">選手管理</div>
        <button class="btn-ghost" style="width:100%" onclick="location.href='players.html'">管理全域選手名單</button>
      </div>

      <!-- Manager Management (admin only) -->
      <div class="admin-section" id="section-managers" style="display:none">
        <div class="section-title">賽程管理者帳號</div>
        <div id="managers-list"><div class="empty-state" style="padding:16px">載入中...</div></div>
        <button class="btn-ghost" style="width:100%;margin-top:10px"
                onclick="openModal('modal-add-manager')">+ 新增賽程管理者</button>
      </div>

      <!-- Settings -->
      <div class="admin-section">
        <div class="section-title">設定</div>
        <button class="btn-ghost" style="width:100%" id="btn-change-pw"
                onclick="openModal('modal-change-pw')">變更密碼</button>
      </div>

    </div>
  </div>

  <!-- Add Tournament Modal -->
  <div class="modal" id="modal-add-tournament">
    <div class="modal-sheet">
      <div class="modal-title">新增賽事</div>
      <div class="input-group">
        <div class="input-label">賽事名稱</div>
        <input type="text" id="t-name" placeholder="例：2025 春季聯賽">
      </div>
      <div class="input-group">
        <div class="input-label">年份</div>
        <input type="number" id="t-year">
      </div>
      <div class="input-group">
        <div class="input-label">說明（選填）</div>
        <input type="text" id="t-desc" placeholder="例：8 支隊伍參賽">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-add-tournament')">取消</button>
        <button class="btn-primary" onclick="submitTournament()">建立</button>
      </div>
    </div>
  </div>

  <!-- Edit Tournament Modal -->
  <div class="modal" id="modal-edit-tournament">
    <div class="modal-sheet">
      <div class="modal-title">編輯賽事</div>
      <input type="hidden" id="et-id">
      <div class="input-group">
        <div class="input-label">賽事名稱</div>
        <input type="text" id="et-name">
      </div>
      <div class="input-group">
        <div class="input-label">年份</div>
        <input type="number" id="et-year">
      </div>
      <div class="input-group">
        <div class="input-label">說明</div>
        <input type="text" id="et-desc">
      </div>
      <div class="input-group">
        <div class="input-label">狀態</div>
        <select id="et-active">
          <option value="1">進行中</option>
          <option value="0">已結束</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-edit-tournament')">取消</button>
        <button class="btn-primary" onclick="submitEditTournament()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Add Manager Modal -->
  <div class="modal" id="modal-add-manager">
    <div class="modal-sheet">
      <div class="modal-title">新增賽程管理者</div>
      <div class="input-group">
        <div class="input-label">顯示名稱</div>
        <input type="text" id="mgr-name" placeholder="例：王小明">
      </div>
      <div class="input-group">
        <div class="input-label">登入帳號</div>
        <input type="text" id="mgr-username" placeholder="例：wangxm">
      </div>
      <div class="input-group">
        <div class="input-label">密碼</div>
        <input type="password" id="mgr-pw" placeholder="至少 4 個字元">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-add-manager')">取消</button>
        <button class="btn-primary" onclick="submitManager()">新增</button>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal" id="modal-change-pw">
    <div class="modal-sheet">
      <div class="modal-title">變更密碼</div>
      <div class="input-group">
        <div class="input-label">新密碼</div>
        <input type="password" id="new-pw1" placeholder="輸入新密碼">
      </div>
      <div class="input-group">
        <div class="input-label">確認新密碼</div>
        <input type="password" id="new-pw2" placeholder="再次輸入">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-change-pw')">取消</button>
        <button class="btn-primary" onclick="submitChangePw()">變更</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { getAdminHash, setAdminHash,
             watchTournaments, createTournament, updateTournament, deleteTournament,
             watchManagers, createManager, updateManager, deleteManager, getManagerByUsername } from './js/db.js';
    import { hashPassword, verifyPassword,
             isAdminAuthed, setAdminAuthed, clearAdminAuth,
             isManagerAuthed, setManagerAuthed, clearManagerAuth, getManagerName, getManagerId } from './js/auth.js';

    let allTournaments = [];
    let allManagers    = [];
    let currentRole    = 'admin';

    // 所有 onclick handler 先掛上 window（function declaration 會 hoist，不受後面程式碼出錯影響）
    window.setRole               = setRole;
    window.login                 = login;
    window.logout                = logout;
    window.submitTournament      = submitTournament;
    window.openEditTournament    = openEditTournament;
    window.submitEditTournament  = submitEditTournament;
    window.confirmDeleteTournament = confirmDeleteTournament;
    window.submitManager         = submitManager;
    window.confirmDeleteManager  = confirmDeleteManager;
    window.submitChangePw        = submitChangePw;
    window.openModal             = openModal;
    window.closeModal            = closeModal;

    // ── Restore session ───────────────────────────────────────
    if (isAdminAuthed())        showPanel('admin');
    else if (isManagerAuthed()) showPanel('manager');

    getAdminHash().then(h => {
      if (!h) document.getElementById('pw-label').textContent = '設定管理員密碼（首次使用）';
    });

    // ── Role toggle ───────────────────────────────────────────
    function setRole(role) {
      currentRole = role;
      const isAdmin = role === 'admin';
      document.getElementById('role-admin').style.background   = isAdmin ? 'var(--primary)' : 'var(--surface2)';
      document.getElementById('role-admin').style.color        = isAdmin ? '#fff' : 'var(--text2)';
      document.getElementById('role-manager').style.background = isAdmin ? 'var(--surface2)' : 'var(--primary)';
      document.getElementById('role-manager').style.color      = isAdmin ? 'var(--text2)' : '#fff';
      document.getElementById('field-username').style.display  = isAdmin ? 'none' : 'flex';
      document.getElementById('pw-label').textContent          = isAdmin ? '管理員密碼' : '密碼';
    }

    // ── Login ─────────────────────────────────────────────────
    async function login() {
      const pw = document.getElementById('input-pw').value.trim();
      if (!pw) return;

      if (currentRole === 'admin') {
        const stored = await getAdminHash();
        if (!stored) {
          if (pw.length < 4) { showError('密碼至少 4 個字元'); return; }
          await setAdminHash(await hashPassword(pw));
          setAdminAuthed(); showPanel('admin'); return;
        }
        if (await verifyPassword(pw, stored)) { setAdminAuthed(); showPanel('admin'); }
        else showError('密碼錯誤');
      } else {
        const username = document.getElementById('input-username').value.trim();
        if (!username) { showError('請輸入帳號'); return; }
        const mgr = await getManagerByUsername(username);
        if (!mgr) { showError('帳號不存在'); return; }
        if (await verifyPassword(pw, mgr.passwordHash)) {
          setManagerAuthed(mgr.name, mgr.id); showPanel('manager');
        } else {
          showError('密碼錯誤');
        }
      }
    }

    function logout() { clearAdminAuth(); clearManagerAuth(); location.reload(); }

    function showPanel(role) {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('main-panel').style.display = 'block';

      if (role === 'admin') {
        document.getElementById('panel-role-label').textContent = '系統管理者';
        document.getElementById('section-managers').style.display = 'block';
        watchManagers(ms => { allManagers = ms; renderManagers(); });
      } else {
        document.getElementById('panel-role-label').textContent = '賽程管理者：' + getManagerName();
        document.getElementById('section-managers').style.display = 'none';
      }
      watchTournaments(ts => { allTournaments = ts; renderTournaments(); });
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg; el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    // ── Tournaments ──────────────────────────────────────────
    function renderTournaments() {
      const el = document.getElementById('admin-tournaments');
      if (allTournaments.length === 0) {
        el.innerHTML = '<div class="empty-state" style="padding:16px">尚無賽事</div>';
        return;
      }
      el.innerHTML = allTournaments.map(t => `
        <div class="card" style="cursor:default">
          <div class="card-row">
            <div style="flex:1;min-width:0">
              <div class="card-title">${esc(t.name)}</div>
              <div class="card-sub">${t.year || ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
              <span class="badge ${t.isActive ? 'badge-active' : 'badge-finished'}">${t.isActive ? '進行中' : '已結束'}</span>
              <button class="btn-ghost" style="font-size:0.8rem;padding:6px 10px"
                      onclick="location.href='tournament.html?id=${t.id}'">查看</button>
              <button class="btn-ghost" style="font-size:0.8rem;padding:6px 10px"
                      onclick="location.href='manage.html?id=${t.id}'">管理</button>
              <button class="btn-ghost" style="font-size:0.8rem;padding:6px 10px"
                      onclick="openEditTournament('${t.id}')">編輯</button>
              <button class="btn-icon danger" onclick="confirmDeleteTournament('${t.id}')">×</button>
            </div>
          </div>
        </div>`).join('');
    }

    async function submitTournament() {
      const name = document.getElementById('t-name').value.trim();
      if (!name) { showToast('請輸入賽事名稱'); return; }
      await createTournament({
        name,
        year: document.getElementById('t-year').value || new Date().getFullYear(),
        description: document.getElementById('t-desc').value.trim()
      });
      closeModal('modal-add-tournament');
      document.getElementById('t-name').value = '';
      document.getElementById('t-desc').value = '';
      showToast('賽事已建立');
    }

    function openEditTournament(id) {
      const t = allTournaments.find(x => x.id === id);
      if (!t) return;
      document.getElementById('et-id').value     = id;
      document.getElementById('et-name').value   = t.name;
      document.getElementById('et-year').value   = t.year || '';
      document.getElementById('et-desc').value   = t.description || '';
      document.getElementById('et-active').value = t.isActive ? '1' : '0';
      openModal('modal-edit-tournament');
    }

    async function submitEditTournament() {
      const id   = document.getElementById('et-id').value;
      const name = document.getElementById('et-name').value.trim();
      if (!name) { showToast('請輸入賽事名稱'); return; }
      await updateTournament(id, {
        name,
        year: Number(document.getElementById('et-year').value),
        description: document.getElementById('et-desc').value.trim(),
        isActive: document.getElementById('et-active').value === '1'
      });
      closeModal('modal-edit-tournament');
      showToast('已儲存');
    }

    async function confirmDeleteTournament(id) {
      if (confirm('確定刪除此賽事？隊伍和比賽資料不會自動刪除。')) {
        await deleteTournament(id);
        showToast('已刪除');
      }
    }

    // ── Managers (admin only) ─────────────────────────────────
    function renderManagers() {
      const el = document.getElementById('managers-list');
      if (allManagers.length === 0) {
        el.innerHTML = '<div class="empty-state" style="padding:16px">尚無賽程管理者</div>';
        return;
      }
      el.innerHTML = allManagers.map(m => `
        <div class="card" style="cursor:default">
          <div class="card-row">
            <div style="flex:1;min-width:0">
              <div class="card-title" style="font-size:0.95rem">${esc(m.name)}</div>
              <div class="card-sub">帳號：${esc(m.username)}</div>
            </div>
            <button class="btn-icon danger" onclick="confirmDeleteManager('${m.id}')">×</button>
          </div>
        </div>`).join('');
    }

    async function submitManager() {
      const name     = document.getElementById('mgr-name').value.trim();
      const username = document.getElementById('mgr-username').value.trim();
      const pw       = document.getElementById('mgr-pw').value;
      if (!name)         { showToast('請輸入名稱'); return; }
      if (!username)     { showToast('請輸入帳號'); return; }
      if (pw.length < 4) { showToast('密碼至少 4 個字元'); return; }
      if (allManagers.some(m => m.username === username)) { showToast('帳號已存在'); return; }
      await createManager({ name, username, passwordHash: await hashPassword(pw) });
      closeModal('modal-add-manager');
      document.getElementById('mgr-name').value     = '';
      document.getElementById('mgr-username').value = '';
      document.getElementById('mgr-pw').value       = '';
      showToast('管理者已新增');
    }

    async function confirmDeleteManager(id) {
      if (confirm('確定刪除此賽程管理者？')) {
        await deleteManager(id);
        showToast('已刪除');
      }
    }

    // ── Change Password ───────────────────────────────────────
    async function submitChangePw() {
      const p1 = document.getElementById('new-pw1').value;
      const p2 = document.getElementById('new-pw2').value;
      if (p1.length < 4) { showToast('密碼至少 4 個字元'); return; }
      if (p1 !== p2)     { showToast('兩次密碼不一致'); return; }
      const hash = await hashPassword(p1);
      if (isAdminAuthed()) {
        await setAdminHash(hash);
      } else {
        await updateManager(getManagerId(), { passwordHash: hash });
      }
      closeModal('modal-change-pw');
      document.getElementById('new-pw1').value = '';
      document.getElementById('new-pw2').value = '';
      showToast('密碼已更新');
    }

    // ── Utilities ────────────────────────────────────────────
    function openModal(id) {
      if (id === 'modal-add-tournament') {
        document.getElementById('t-year').value = new Date().getFullYear();
      }
      document.getElementById(id).classList.add('open');
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
