<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>賽事 - PicklePoints</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <button class="btn-back" onclick="location.href='index.html'">← 返回</button>
    <span id="t-name" style="color:var(--text2);font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%"></span>
    <div style="width:48px"></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tab-schedule"    onclick="switchTab('schedule')">賽程表</button>
    <button class="tab-btn"        id="tab-leaderboard" onclick="switchTab('leaderboard')">排行榜</button>
  </div>

  <!-- Schedule Tab -->
  <div id="view-schedule" class="page-content">
    <div class="filter-bar" id="sf-bar">
      <button class="filter-btn active" data-cat="all"    onclick="filterSched('all')">全部</button>
      <button class="filter-btn"        data-cat="mens"   onclick="filterSched('mens')">男雙</button>
      <button class="filter-btn"        data-cat="womens" onclick="filterSched('womens')">女雙</button>
      <button class="filter-btn"        data-cat="mixed"  onclick="filterSched('mixed')">混雙</button>
    </div>
    <div id="matches-list"><div class="empty-state">載入中...</div></div>
  </div>

  <!-- Leaderboard Tab -->
  <div id="view-leaderboard" class="page-content" style="display:none">
    <div class="filter-bar" id="lf-bar">
      <button class="filter-btn active" data-cat="all"    onclick="filterBoard('all')">全部</button>
      <button class="filter-btn"        data-cat="mens"   onclick="filterBoard('mens')">男雙</button>
      <button class="filter-btn"        data-cat="womens" onclick="filterBoard('womens')">女雙</button>
      <button class="filter-btn"        data-cat="mixed"  onclick="filterBoard('mixed')">混雙</button>
    </div>
    <div id="leaderboard-body"><div class="empty-state">載入中...</div></div>
  </div>

  <!-- FAB: admin only -->
  <button class="fab" id="fab-add" style="display:none" onclick="openModal('modal-add-match')">+</button>

  <!-- Add Match Modal -->
  <div class="modal" id="modal-add-match">
    <div class="modal-sheet">
      <div class="modal-title">新增比賽</div>
      <div class="input-group">
        <div class="input-label">組別</div>
        <select id="mc-category">
          <option value="mens">男雙</option>
          <option value="womens">女雙</option>
          <option value="mixed">混雙</option>
        </select>
      </div>
      <div class="input-group">
        <div class="input-label">隊伍 A</div>
        <select id="mc-team-a"><option value="">請先新增隊伍</option></select>
      </div>
      <div class="input-group">
        <div class="input-label">隊伍 B</div>
        <select id="mc-team-b"><option value="">請先新增隊伍</option></select>
      </div>
      <div class="input-group">
        <div class="input-label">輪次</div>
        <input type="number" id="mc-round" value="1" min="1">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-add-match')">取消</button>
        <button class="btn-primary" onclick="submitMatch()">新增</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { watchTournament, watchMatches, watchTeams, createMatch, deleteMatch } from './js/db.js';
    import { isAdminAuthed } from './js/auth.js';

    const params = new URLSearchParams(location.search);
    const tid = params.get('id');
    if (!tid) { location.href = 'index.html'; throw new Error('no tid'); }

    const CAT_LABEL = { mens: '男雙', womens: '女雙', mixed: '混雙' };
    const CAT_BADGE = { mens: 'badge-mens', womens: 'badge-womens', mixed: 'badge-mixed' };

    let allMatches = [];
    let allTeams   = [];
    let schedFilter = 'all';
    let boardFilter = 'all';

    if (isAdminAuthed()) document.getElementById('fab-add').style.display = 'flex';

    watchTournament(tid, t => {
      document.getElementById('t-name').textContent = t.name;
      document.title = t.name + ' - PicklePoints';
    });

    watchMatches(tid, ms => { allMatches = ms; renderSchedule(); });
    watchTeams(tid, ts => { allTeams = ts; renderLeaderboard(); populateTeamSelects(); });

    // ── Schedule ─────────────────────────────────────────────
    function renderSchedule() {
      const list = schedFilter === 'all' ? allMatches : allMatches.filter(m => m.category === schedFilter);
      const el = document.getElementById('matches-list');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-state">尚無比賽</div>';
        return;
      }
      el.innerHTML = list.map(m => {
        const scoreHtml = m.isFinished
          ? `<span class="score-chip finished">${m.scoreA} - ${m.scoreB}（結束）</span>`
          : `<span class="score-chip">${m.scoreA} - ${m.scoreB}</span>`;
        const adminBtn = isAdminAuthed()
          ? `<button class="btn-icon danger" onclick="event.stopPropagation();confirmDeleteMatch('${m.id}')">×</button>`
          : '';
        return `
          <div class="card" onclick="goToScoreboard('${m.id}')">
            <div class="card-row">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                  <span class="badge ${CAT_BADGE[m.category] || ''}">${CAT_LABEL[m.category] || m.category}</span>
                  <span style="color:var(--text3);font-size:0.8rem">R${m.round}</span>
                </div>
                <div class="card-title" style="font-size:1rem">${esc(m.teamAName)} vs ${esc(m.teamBName)}</div>
                <div style="margin-top:5px">${scoreHtml}</div>
              </div>
              <div style="display:flex;align-items:center;gap:2px;flex-shrink:0">
                ${adminBtn}
                <span style="color:#444;font-size:1.4rem">›</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Leaderboard ──────────────────────────────────────────
    function renderLeaderboard() {
      const list = boardFilter === 'all' ? allTeams : allTeams.filter(t => t.category === boardFilter);
      const el = document.getElementById('leaderboard-body');
      if (list.length === 0) {
        el.innerHTML = '<div class="empty-state">尚無隊伍</div>';
        return;
      }
      const sorted = [...list].sort((a, b) => (b.points || 0) - (a.points || 0));
      const rows = sorted.map((t, i) => `
        <tr class="rank-${i + 1}">
          <td><span class="rank-num">${i + 1}</span></td>
          <td>
            <div class="team-name-cell">${esc(t.name)}</div>
            <div class="team-sub-cell">${(t.players || []).map(esc).join(' / ')}</div>
          </td>
          <td class="wl-cell">${t.wins || 0}W ${t.losses || 0}L</td>
          <td class="pts-cell">${t.points || 0}</td>
        </tr>`).join('');

      el.innerHTML = `
        <table class="leaderboard">
          <thead><tr>
            <th>#</th><th>隊伍</th><th style="text-align:center">勝負</th><th style="text-align:right">積分</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function populateTeamSelects() {
      ['mc-team-a', 'mc-team-b'].forEach(id => {
        const sel = document.getElementById(id);
        const cur = sel.value;
        sel.innerHTML = allTeams.length === 0
          ? '<option value="">請先在後台新增隊伍</option>'
          : allTeams.map(t => `<option value="${t.id}">${esc(t.name)} (${CAT_LABEL[t.category] || t.category})</option>`).join('');
        if (cur) sel.value = cur;
      });
    }

    // ── Handlers ─────────────────────────────────────────────
    window.switchTab = function(tab) {
      const isSched = tab === 'schedule';
      document.getElementById('view-schedule').style.display    = isSched ? 'block' : 'none';
      document.getElementById('view-leaderboard').style.display = isSched ? 'none'  : 'block';
      document.getElementById('tab-schedule').classList.toggle('active', isSched);
      document.getElementById('tab-leaderboard').classList.toggle('active', !isSched);
    };

    window.filterSched = function(cat) {
      schedFilter = cat;
      document.querySelectorAll('#sf-bar .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderSchedule();
    };

    window.filterBoard = function(cat) {
      boardFilter = cat;
      document.querySelectorAll('#lf-bar .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      renderLeaderboard();
    };

    window.goToScoreboard = function(mid) {
      location.href = `scoreboard.html?tid=${tid}&mid=${mid}`;
    };

    window.openModal  = id => document.getElementById(id).classList.add('open');
    window.closeModal = id => document.getElementById(id).classList.remove('open');

    window.submitMatch = async function() {
      const aId = document.getElementById('mc-team-a').value;
      const bId = document.getElementById('mc-team-b').value;
      if (!aId || !bId)          { showToast('請選擇隊伍'); return; }
      if (aId === bId)           { showToast('請選擇不同的兩支隊伍'); return; }
      const teamA = allTeams.find(t => t.id === aId);
      const teamB = allTeams.find(t => t.id === bId);
      await createMatch(tid, {
        teamAId: aId, teamAName: teamA.name,
        teamBId: bId, teamBName: teamB.name,
        category: document.getElementById('mc-category').value,
        round: parseInt(document.getElementById('mc-round').value) || 1
      });
      closeModal('modal-add-match');
      showToast('比賽已新增');
    };

    window.confirmDeleteMatch = async function(mid) {
      if (confirm('確定刪除此場比賽？')) {
        await deleteMatch(tid, mid);
        showToast('已刪除');
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
